name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: my-app/package-lock.json

      - name: Install dependencies
        working-directory: my-app
        run: npm ci

      - name: Lint
        working-directory: my-app
        run: npm run lint

      - name: Build
        working-directory: my-app
        run: npm run build
